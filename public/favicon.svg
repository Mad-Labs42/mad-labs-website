<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <filter id="thin-glow" x="-24%" y="-24%" width="148%" height="148%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
