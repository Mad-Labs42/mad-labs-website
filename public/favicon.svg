    <ellipse cx="96" cy="96" rx="65" ry="24" stroke="#ce47ff" stroke-width="5" transform="rotate(60 96 96)"/>
    <ellipse cx="96" cy="96" rx="65" ry="24" stroke="#00f07a" stroke-width="5" transform="rotate(-60 96 96)"/>
  </g>
  <circle cx="96" cy="96" r="8" fill="#ffffff"/>
</svg>
