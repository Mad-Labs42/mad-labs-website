              - generic [ref=e738]:
                - generic [ref=e739]: deleteEmailNotifications
                - generic [ref=e740]: "PURPOSE: Deletes one or more email notification definitions by their IDs. MANDATORY: ids query parameter (comma-separated notification IDs). KEY CONSTRAINTS: Notifications associated with active workflow rules, approval processes, or blueprints cannot be deleted (returns NOT_ALLOWED). Returns per-notification success/error status. Use GET /settings/automation/email_notifications to discover notification IDs before deleting."
              - img [ref=e743]
            - generic [ref=e745] [cursor=pointer]:
              - generic [ref=e746]:
                - generic [ref=e747]: deleteFieldUpdates
                - generic [ref=e748]: "PURPOSE: Deletes multiple field update actions by IDs. MANDATORY: ids query parameter (comma-separated, max 10). KEY CONSTRAINTS: Actions associated with active automation rules return NOT_ALLOWED. Read-only actions cannot be deleted. Returns per-ID success/error status."
              - img [ref=e751]
            - generic [ref=e753] [cursor=pointer]:
              - generic [ref=e754]:
                - generic [ref=e755]: reorderWorkflowRules
                - generic [ref=e756]: "PURPOSE: Updates the execution order of workflow rules for a specific module. By default, rules execute in creation order. MANDATORY: module query parameter (string - module api_name), request body with ordered array of rule IDs representing the new execution sequence. KEY CONSTRAINTS: All active rules for the module must be included in the array. Missing rules return an error."
              - img [ref=e759]
            - generic [ref=e761] [cursor=pointer]:
              - generic [ref=e762]:
                - generic [ref=e763]: postEmailNotifications
                - generic [ref=e764]: "PURPOSE: Creates an email notification action that can be linked to workflow rules, approval processes, blueprints, kiosks, scoring rules, and case escalation rules. PREREQUISITES: (1) Call GET /settings/modules to discover valid module api_names. (2) Fetch available email templates from the Email Templates API for the configured module. STRUCTURE: The request body contains an email_notifications array with exactly 1 object. MANDATORY: name, module, template, and recipients (at least one in recipients.to). Returns the created notification ID."
              - img [ref=e767]
            - generic [ref=e769] [cursor=pointer]:
              - generic [ref=e770]:
                - generic [ref=e771]: deleteWorkflowRuleById
                - generic [ref=e772]: "PURPOSE: Deletes an existing workflow rule by its ID. MANDATORY: id path parameter (string - workflow rule ID). KEY CONSTRAINTS: Locked rules cannot be deleted (returns RECORD_LOCKED). Returns success/error status."
              - img [ref=e775]
            - generic [ref=e777] [cursor=pointer]:
              - generic [ref=e778]:
                - generic [ref=e779]: createFieldUpdates
                - generic [ref=e780]: "PURPOSE: Creates a field update action that assigns a static value to a field when triggered by a workflow rule. PREREQUISITES: GET /settings/fields?module={api_name} for field id + api_name. For Pipeline: resolve values from GET /settings/pipeline?module={api_name}, include Stage in dependent_fields. For Layout: resolve from GET /settings/layouts, include dependent Pipeline. For Owner: GET /users for user id, include notify + related_records. MANDATORY in body: field_updates array with 1 entry containing name, module, field ({id, api_name}), type ('static'), value. Returns created action ID for use in workflow rule associate actions."
              - img [ref=e783]
            - generic [ref=e785] [cursor=pointer]:
              - generic [ref=e786]:
                - generic [ref=e787]: updateEmailNotification
                - generic [ref=e788]: "PURPOSE: Updates an existing email notification action identified by the path parameter ID. PREREQUISITES: (1) Call GET /settings/automation/email_notifications/{id} to obtain the current notification structure. (2) Fetch available email templates from the Email Templates API. BEHAVIOR: All three required fields (name, template, recipients) must be provided - partial updates are not supported. Only name, template, recipients, from_address, and reply_to_address can be modified. KEY CONSTRAINTS: module, related_module, bulk_email, and feature_type are immutable after creation. Locked notifications return 401 AUTHORIZATION_ERROR."
              - img [ref=e791]
            - generic [ref=e793] [cursor=pointer]:
              - generic [ref=e794]:
                - generic [ref=e795]: deleteEmailNotificationById
                - generic [ref=e796]: "PURPOSE: Deletes a single email notification definition by its ID. MANDATORY: id path parameter (string - notification definition ID). KEY CONSTRAINTS: Notifications associated with active workflow rules, approval processes, or blueprints cannot be deleted (returns NOT_ALLOWED). Returns success/error status."
              - img [ref=e799]
            - generic [ref=e801] [cursor=pointer]:
              - generic [ref=e802]:
                - generic [ref=e803]: deleteWorkflowRules
                - generic [ref=e804]: "PURPOSE: Deletes one or more workflow rules by their IDs. MANDATORY: ids query parameter (comma-separated rule IDs, max 10). KEY CONSTRAINTS: Locked rules cannot be deleted (returns RECORD_LOCKED error). Returns per-rule success/error status. Use `getWorkflowRules` to discover rule IDs before deleting."
              - img [ref=e807]
            - generic [ref=e809] [cursor=pointer]:
              - generic [ref=e810]:
                - generic [ref=e811]: postWorkflowRule
                - generic [ref=e812]: "Creates a workflow rule for a specified module. PREREQUISITES: (1) MUST call `getWorkflowConfigurations` FIRST -- trigger availability is module-specific (the trigger enum lists ALL triggers globally, not per-module -- using an unsupported trigger returns INVALID_DATA with no diagnostic detail). Do NOT construct the payload without configuration data. (2) MUST call `getWorkflowRulesCount` to discover org-specific limits -- do NOT assume fixed limits for conditions, actions, or scheduled actions. (3) MUST call `getFields` if using field in criteria, field_mappings, or field_updates. BODY: workflow_rules array with exactly 1 rule object. See request schema for structure. FLOW: configurations API -> rules count API -> choose trigger -> build payload. Returns the created rule ID."
              - img [ref=e815]
            - generic [ref=e817] [cursor=pointer]:
              - generic [ref=e818]:
                - generic [ref=e819]: updateFieldUpdateById
                - generic [ref=e820]: "PURPOSE: Updates an existing field update action by path ID. PREREQUISITES: Same as POST - resolve field metadata, pipeline/layout/owner values from respective APIs. BEHAVIOR: Resend ALL required fields (name, module, field, type, value) - partial updates are not reliably supported. Dependency rules same as create. KEY CONSTRAINTS: Locked actions require privilege. Read-only actions cannot be modified."
              - img [ref=e823]
            - generic [ref=e825] [cursor=pointer]:
              - generic [ref=e826]:
                - generic [ref=e827]: deleteFieldUpdateById
                - generic [ref=e828]: "PURPOSE: Deletes a single field update action by path ID. KEY CONSTRAINTS: Actions associated with active automation rules return NOT_ALLOWED. Read-only actions cannot be deleted."
              - img [ref=e831]
            - generic [ref=e833] [cursor=pointer]:
              - generic [ref=e834]:
                - generic [ref=e835]: getWorkflowRules
                - generic [ref=e836]: "PURPOSE: Retrieves a paginated list of workflow rules. OPTIONAL FILTERS: module (string - filter by module api_name), status_active (boolean - true for active, false for inactive), execute_on (string - filter by trigger type), filter (JSON - search by rule name using contains comparator). KEY PARAMETER: include_inner_details to get full condition details, criteria, and action configurations (default returns only summary). PAGINATION: page (default 1), per_page (default 200, max 200). Use this before PUT/DELETE to discover rule IDs."
              - img [ref=e839]
            - generic [ref=e841] [cursor=pointer]:
              - generic [ref=e842]:
                - generic [ref=e843]: updateWorkflowRuleById
                - generic [ref=e844]: "PURPOSE: Updates an existing workflow rule identified by the path parameter ID. PREREQUISITES: (1) Call `getWorkflowRuleById` to obtain the current rule structure. (2) Call `getWorkflowConfigurations` to verify supported triggers and actions. BEHAVIOR: Supports partial updates - only include fields you want to change. Existing actions not included in the request are preserved. To remove an action, include it with _delete: null. KEY CONSTRAINTS: Locked rules return RECORD_LOCKED. Cannot change module after creation."
              - img [ref=e847]
            - generic [ref=e849] [cursor=pointer]:
              - generic [ref=e850]:
                - generic [ref=e851]: getWorkflowRuleById
                - generic [ref=e852]: "PURPOSE: Retrieves the full details of a specific workflow rule including trigger configuration, conditions, criteria, instant and scheduled actions, lock status, and usage metadata. MANDATORY: id path parameter (string - workflow rule ID). Returns complete rule structure - use this to inspect the current state before updating via PUT."
              - img [ref=e855]
            - generic [ref=e857] [cursor=pointer]:
              - generic [ref=e858]:
                - generic [ref=e859]: getEmailNotifications
                - generic [ref=e860]: "PURPOSE: Retrieves a paginated list of email notification definitions. Supports filtering by module, related_module, feature_type, and name (via filter param). PAGINATION: page (default 1), per_page (default 200, max 200). Use more_records to determine if additional pages exist. A 204 response indicates no notifications match the supplied filters. Use this before PUT/DELETE to discover notification IDs."
              - img [ref=e863]